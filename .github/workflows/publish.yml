name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run ci
      - run: npm run release:binding
      - name: Publish @aikdna/kdna-web-client
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@aikdna/kdna-web-client@$VERSION" version >/dev/null 2>&1; then
            echo "@aikdna/kdna-web-client@$VERSION is already published; skipping."
            exit 0
          fi
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
